version: v1
plugins:
  # Go types + gRPC stubs (uses locally-installed protoc-gen-go / protoc-gen-go-grpc).
  # Install with:
  #   go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
  #   go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
  - plugin: go
    out: backend/schema
    opt:
      - paths=source_relative
  - plugin: go-grpc
    out: backend/schema
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false

  # Python and TypeScript targets are added when those adapters/clients need them.
  # The Panopticon (Python) adapter and the frontend currently use hand-written
  # types; switch them to generated code by uncommenting and installing the
  # corresponding plugins.
